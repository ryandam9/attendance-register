name: CI

on:
  push:
    branches: [main]
    # Pushing a version tag (e.g. v1.0.0) cuts a versioned GitHub release.
    tags: ['v*']
  pull_request:
  # "Run workflow" button in the Actions tab — builds artifacts from any
  # branch on demand.
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The database tests run sqflite against the system SQLite via FFI.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          # Pinned so the `dart format` gate is deterministic — a newer stable
          # Flutter can change the formatter and silently break this check.
          flutter-version: 3.44.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # Builds portable desktop apps on their native runners (in parallel), on every
  # push to main, on version tags and on manual dispatch. A separate release job
  # collects both. Skipped for pull requests to keep their feedback loop fast.
  build-windows:
    if: github.event_name != 'pull_request'
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          cache: true

      # flutter create only fills in missing files, so committed sources are kept.
      - name: Generate Windows scaffolding
        run: flutter create . --project-name attendance_register --org com.example --platforms windows

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      # Self-contained folder (exe + DLLs + data\); zip into one archive.
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath attendance-register-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-register-windows
          path: attendance-register-windows.zip
          retention-days: 30

  build-macos:
    if: github.event_name != 'pull_request'
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          cache: true

      - name: Generate macOS scaffolding
        run: flutter create . --project-name attendance_register --org com.example --platforms macos

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      # The .app is unsigned (no Apple Developer cert), so first launch needs a
      # right-click → Open to get past Gatekeeper. Zip with -y to keep symlinks.
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/attendance-register-macos.zip" *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-register-macos
          path: attendance-register-macos.zip
          retention-days: 30

  # Collect both desktop builds into one release: versioned on a tag, rolling
  # "latest" on a push to main. Manual dispatch only produces the artifacts.
  release:
    if: github.event_name == 'push'
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update releases
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        run: |
          set -euo pipefail
          FILES=$(find dist -name '*.zip')
          NOTES="Portable desktop builds (${GITHUB_SHA::7}). Windows: unzip and run attendance_register.exe (no installer, no admin). macOS: unzip and open the .app (unsigned — first launch: right-click -> Open). Keep each app's files together."
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            gh release create "$TAG" $FILES --title "$TAG" --notes "$NOTES"
          else
            # One rolling release with a stable URL:
            # https://github.com/ryandam9/attendance-register/releases/latest
            gh release delete latest --cleanup-tag --yes || true
            gh release create latest $FILES \
              --title "Latest build (${GITHUB_SHA::7})" \
              --notes "$NOTES" \
              --latest
          fi
