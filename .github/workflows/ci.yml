name: CI

on:
  push:
    branches: [main]
    # Pushing a version tag (e.g. v1.0.0) cuts a versioned GitHub release.
    tags: ['v*']
  pull_request:
  # "Run workflow" button in the Actions tab — builds artifacts from any
  # branch on demand.
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The database tests run sqflite against the system SQLite via FFI.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # Builds a portable Windows desktop app on every push to main (published to
  # the rolling "latest" release), on version tags (versioned release) and on
  # manual dispatch. Skipped for pull requests to keep their feedback loop fast.
  build-windows:
    if: github.event_name != 'pull_request'
    needs: analyze-and-test
    runs-on: windows-latest
    permissions:
      contents: write # create/update releases
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The repo ships only the hand-written sources; generate the missing
      # Windows runner boilerplate. flutter create only fills in missing files,
      # so the committed sources are preserved.
      - name: Generate Windows scaffolding
        run: flutter create . --project-name attendance_register --org com.example --platforms windows

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      # The build output is a self-contained folder (exe + DLLs + data\). Zip it
      # so it downloads as a single, ready-to-run archive — no installer.
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath attendance-register-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-register-windows
          path: attendance-register-windows.zip
          retention-days: 30

      # Versioned release on a tag, rolling "latest" on main. Manual dispatch
      # only produces the workflow artifact above (no release).
      - name: Publish release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ZIP=attendance-register-windows.zip
          NOTES="Portable Windows build (${GITHUB_SHA::7}). Unzip and run attendance_register.exe — no installer and no admin rights needed. Keep the .exe together with the DLLs and the data folder."
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            gh release create "$TAG" "$ZIP" --title "$TAG" --notes "$NOTES"
          else
            # Keep a single rolling release so there is one stable download URL:
            # https://github.com/ryandam9/attendance-register/releases/latest
            gh release delete latest --cleanup-tag --yes || true
            gh release create latest "$ZIP" \
              --title "Latest build (${GITHUB_SHA::7})" \
              --notes "$NOTES" \
              --latest
          fi
