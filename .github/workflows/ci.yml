name: CI

on:
  push:
    branches: [main]
  pull_request:
  # "Run workflow" button in the Actions tab — builds an APK from any branch
  # on demand.
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The database tests run sqflite against the system SQLite via FFI.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # Builds an installable APK on every push to main (published to the rolling
  # "latest" release) and on manual dispatch. Skipped for pull requests to
  # keep their feedback loop fast.
  build-apk:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the "latest" release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The repo ships only the hand-written sources; generate the missing
      # Gradle wrapper / platform boilerplate without overwriting anything —
      # the same step the README's local setup uses.
      - name: Generate platform scaffolding
        run: flutter create . --project-name attendance_register --org com.example --platforms android

      - name: Install dependencies
        run: flutter pub get

      # Signed with the debug key (see android/app/build.gradle) — fine for
      # personal sideloading, not for store distribution.
      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-register-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # Keep a single rolling release so there is one stable download URL:
      # https://github.com/ryandam9/attendance-register/releases/latest
      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest build/app/outputs/flutter-apk/app-release.apk \
            --title "Latest build (${GITHUB_SHA::7})" \
            --notes "Automated build from main @ ${GITHUB_SHA}. Download app-release.apk below and install on Android 8.0+ (debug-signed; allow installs from unknown sources)." \
            --latest
