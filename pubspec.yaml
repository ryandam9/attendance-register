name: attendance_register
description: "Office Attendance Tracker — records return-to-office days using geolocation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.4.3
  # Desktop (Linux/Windows) has no native sqflite — use the FFI backend with a
  # bundled sqlite3. Android/iOS/macOS keep the native sqflite plugin.
  sqflite_common_ffi: ^2.4.1
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.1

  # Location & Geofencing
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  native_geofence: ^1.2.2

  # UI
  table_calendar: ^3.2.0
  cupertino_icons: ^1.0.9
  animations: ^2.0.11
  confetti: ^0.8.0
  dynamic_color: ^1.7.0

  # Permissions
  permission_handler: ^12.0.3

  # State management
  flutter_riverpod: ^3.3.1

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # App icon + splash generators. Replace assets/branding/app_icon.png with the
  # real 1024×1024 artwork, then run:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/birds/
    - assets/branding/

# Generated app launcher icons (run: dart run flutter_launcher_icons).
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#00346E"
  adaptive_icon_foreground: "assets/branding/app_icon.png"

# Generated splash screen (run: dart run flutter_native_splash:create).
flutter_native_splash:
  color: "#00346E"
  image: "assets/branding/app_icon.png"
  android_12:
    color: "#00346E"
    image: "assets/branding/app_icon.png"
