name: attendance_register
description: "Office Attendance Tracker — records return-to-office days using geolocation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.4.3
  path: ^1.9.1

  # Location & Geofencing
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  native_geofence: ^1.2.2

  # Wi-Fi network scanning (second check-in path: detect visible office
  # networks without connecting to them; Android only)
  wifi_scan: ^0.4.1

  # UI
  table_calendar: ^3.2.0
  cupertino_icons: ^1.0.9
  animations: ^2.0.11
  confetti: ^0.8.0
  dynamic_color: ^1.7.0

  # Permissions
  permission_handler: ^12.0.3

  # State management
  flutter_riverpod: ^3.3.1

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.1

flutter:
  uses-material-design: true
