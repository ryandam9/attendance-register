name: attendance_register
description: "Office Attendance Tracker — records return-to-office days using geolocation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Background task scheduling
  workmanager: ^0.5.2

  # UI
  table_calendar: ^3.1.2
  cupertino_icons: ^1.0.8

  # Permissions
  permission_handler: ^11.3.1

  # State management
  flutter_riverpod: ^2.6.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
