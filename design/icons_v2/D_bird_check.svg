<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgBlue" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1A73E8"/><stop offset="1" stop-color="#0B57D0"/>
